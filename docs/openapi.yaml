      operationId: api_v1_ai_analyze_create
      description: POST /ai/analyze — analizi kuyruğa alır (cache varsa anında döner).
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/ai/tasks/{task_id}/:
