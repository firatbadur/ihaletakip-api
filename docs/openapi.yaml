  /api/v1/auth/token/refresh/:
    post:
      operationId: api_v1_auth_token_refresh_create
      description: 'Süresi dolan `access` token''ı `refresh` ile yeniler.


        **Rotasyon açıktır** (`ROTATE_REFRESH_TOKENS`): yanıt yeni bir `access` ile
        birlikte **yeni bir `refresh`** de döner ve gönderdiğiniz eski `refresh` anında
        kara listeye alınır. İstemci sakladığı refresh token''ı her yenilemede güncellemelidir;
        eskisini tekrar kullanmak `401` verir.


        Bu uç kimlik doğrulaması istemez — `refresh` token''ın kendisi yeterlidir.


        Postman''de başarılı yanıt `access_token` ve `refresh_token` değişkenlerini
        otomatik günceller.'
      summary: Access token yenile
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
            examples:
              RefreshTokenIle:
                value:
                  refresh: '{{refresh_token}}'
                summary: Refresh token ile
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
