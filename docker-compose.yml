# ═══════════════════════════════════════════════════════
#  IhaleTakip API — Docker Compose (Ubuntu üretim)
#  Servisler: db (postgres), redis, web (gunicorn), nginx,
#             worker (celery), ekap-worker, beat (celery beat)
#
#  Ortam dosyası: .env.prod  (bkz. .env.example → kopyalayıp doldur)
#  Çalıştırma:    docker compose up -d --build
#  Dışa açılan tek port: 443 (nginx). Cloudflare 443 → origin:443 (varsayılan).
# ═══════════════════════════════════════════════════════

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_DB/USER/PASSWORD .env.prod'dan gelir (tek kaynak → DATABASE_URL ile tutarlı)
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ihale}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./credentials:/app/credentials:ro
    # Doğrudan dışa açılmaz — yalnızca nginx üzerinden erişilir (iç ağ).
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Cloudflare Origin Certificate (cf-origin.pem + cf-origin.key) — sunucuda oluşturulur.
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    ports:
      # Dışa açılan tek port. Cloudflare 443 (SSL) → origin:443 (nginx TLS, Full-strict).
      - "443:443"
    depends_on:
      web:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    environment:
      RUN_MIGRATIONS: "false"
    # Genel kuyruk (ekap hariç) — ai analiz, bildirim vb.
    command: ["celery", "-A", "config", "worker", "-l", "info", "-Q", "celery", "--concurrency=4"]
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      - web
      - redis

  ekap-worker:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    environment:
      RUN_MIGRATIONS: "false"
    # EKAP kuyruğu — rate limit için TEK concurrency ile serileştirilir
    command: ["celery", "-A", "config", "worker", "-l", "info", "-Q", "ekap", "--concurrency=1"]
    depends_on:
      - web
      - redis

  beat:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    environment:
      RUN_MIGRATIONS: "false"
    command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    depends_on:
      - web
      - redis

volumes:
  pgdata:
  redisdata:
  static_volume:
  media_volume:
