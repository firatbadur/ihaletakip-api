  /api/v1/ekap/tenders/:
    get:
      operationId: api_v1_ekap_tenders_list
      description: 'İhaleleri **kendi veritabanımızdan** arar — EKAP''a istek gitmez,
        rate limit yoktur. Alan adları EKAP''ın kendi adlandırmasıyla döner.


        Yanıt: `data.list` (ihaleler), `data.totalCount` (toplam kayıt), `data.page`.


        `il`, `tur`, `usul` ve `durum` **virgülle ayrılmış id listesi** alır (ör.
        `tur=1,3`). Sayı olmayan değerler yok sayılır.


        **İhale türü (`tur`):** 1 Mal Alımı · 2 Yapım · 3 Hizmet · 4 Danışmanlık


        **İhale usulü (`usul`):** 1 Açık İhale · 2 Belli İstekliler Arasında · 3 Pazarlık
        (MD 21 F) · 4 Doğrudan Temin


        **İhale durumu (`durum`):** 1 Taslak · 2/3 Katılıma Açık · 4 Değerlendirme
        Tamamlanmış · 5 Değerlendirmede · 6/10 İptal Edilmiş · 15 Sonuç İlanı Yayımlanmış
        · 20 Sözleşme İmzalanmış


        **İl id''leri** EKAP''ın kendi il kodlarıdır (plaka değil!) — `GET /api/v1/ekap/cities/`
        ile alın. Örn. Ankara `251`, İstanbul `284`.'
      summary: İhale ara / listele
      parameters:
      - in: query
        name: durum
        schema:
          type: string
        description: İhale durumu id listesi.
        examples:
          KatılımaAçık:
            value: 2,3
            summary: Katılıma açık
      - in: query
        name: ihale_baslangic
        schema:
          type: string
        description: İhale tarihi alt sınırı. `GG.AA.YYYY`, `GG.AA.YYYY SS:dd` veya
          ISO-8601. Geçersiz tarih yok sayılır.
        examples:
          Tarih:
            value: 01.01.2026
      - in: query
        name: ihale_bitis
        schema:
          type: string
        description: İhale tarihi üst sınırı. `GG.AA.YYYY`, `GG.AA.YYYY SS:dd` veya
          ISO-8601. Geçersiz tarih yok sayılır.
        examples:
          Tarih:
            value: 31.12.2026
      - in: query
        name: il
        schema:
          type: string
        description: EKAP il id listesi (virgülle). `GET /ekap/cities/` ile alın.
        examples:
          Ankara+İstanbul:
            value: 251,284
            summary: Ankara + İstanbul
      - in: query
        name: ilan_baslangic
        schema:
          type: string
        description: İlan tarihi alt sınırı. `GG.AA.YYYY`, `GG.AA.YYYY SS:dd` veya
          ISO-8601. Geçersiz tarih yok sayılır.
        examples:
          Tarih:
            value: 01.01.2026
      - in: query
        name: ilan_bitis
        schema:
          type: string
        description: İlan tarihi üst sınırı. `GG.AA.YYYY`, `GG.AA.YYYY SS:dd` veya
          ISO-8601. Geçersiz tarih yok sayılır.
        examples:
          Tarih:
            value: 31.12.2026
      - in: query
        name: order
        schema:
          type: string
          enum:
          - ihaleTarihi
          - ilanTarihi
          default: ihaleTarihi
        description: Sıralama alanı.
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: Sayfa numarası (1'den başlar).
      - in: query
        name: page_size
        schema:
          type: integer
          default: 10
        description: Sayfa boyutu. **En fazla 100** (aşan değer 100'e kırpılır).
      - in: query
        name: q
        schema:
          type: string
        description: İhale adında veya İKN'de geçen metin (kısmi eşleşme).
        examples:
          MetinArama:
            value: bilgisayar
            summary: Metin arama
      - in: query
        name: siralamaTipi
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
        description: Sıralama yönü.
      - in: query
        name: tur
        schema:
          type: string
        description: 'İhale türü id listesi: 1 Mal, 2 Yapım, 3 Hizmet, 4 Danışmanlık.'
        examples:
          Mal+Hizmet:
            value: 1,3
            summary: Mal + Hizmet
      - in: query
        name: usul
        schema:
          type: string
        description: İhale usulü id listesi (1-4).
        examples:
          AçıkIhale:
            value: '1'
            summary: Açık ihale
      tags:
      - ekap
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/ekap/tenders/{ekap_id}/document-url/:
    get:
      operationId: api_v1_ekap_tenders_document_url_retrieve
      description: 'İhale dokümanının indirme bağlantısını döner (`data.url`). Bu
        URL EKAP tarafında **dinamik üretilir ve kısa ömürlüdür**, bu yüzden istek
