components:
  schemas:
    Favorite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tender_id:
          type: string
          maxLength: 100
        tender_title:
          type: string
          maxLength: 500
        tender_type:
          type: string
          nullable: true
          maxLength: 50
        source:
          type: string
          maxLength: 30
        added_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - added_at
      - id
      - tender_id
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          readOnly: true
        title:
          type: string
          readOnly: true
        body:
          type: string
          readOnly: true
        tender_id:
          type: string
          readOnly: true
          nullable: true
        tender_title:
          type: string
          readOnly: true
          nullable: true
        tender_ikn:
          type: string
          readOnly: true
          nullable: true
        institution:
          type: string
          readOnly: true
          nullable: true
        read:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - created_at
      - id
      - institution
      - read
      - tender_id
      - tender_ikn
      - tender_title
      - title
      - type
    PatchedSavedFilter:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        filters: {}
        tags: {}
        alarm:
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    SavedFilter:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        filters: {}
        tags: {}
        alarm:
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    SavedTender:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tender_id:
          type: string
          maxLength: 100
        tender_ikn:
          type: string
          maxLength: 100
        tender_title:
          type: string
          maxLength: 500
        tender_type:
          type: string
          nullable: true
          maxLength: 50
        tender_status:
          type: string
          nullable: true
          maxLength: 50
        tender_city:
          type: string
          nullable: true
          maxLength: 100
        tender_date:
          type: string
          nullable: true
          maxLength: 50
        institution:
          type: string
          nullable: true
          maxLength: 500
        saved_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - saved_at
      - tender_ikn
    StatusEnum:
      enum:
      - Bekliyor
      - İşlemde
