openapi: 3.0.3
info:
  title: IhaleTakip API
  version: 1.0.0
  description: Kamu ihalesi takip uygulaması backend servisi
paths:
  /api/v1/ai/analyze/:
    post:
      operationId: api_v1_ai_analyze_create
      description: 'Analizi Celery kuyruğuna alır ve `202` ile `task_id` döner. Sonucu
        almak için `GET /api/v1/ai/tasks/{task_id}` ucunu yoklayın (poll).


        İstisna: `ikn` gönderilmişse ve o İKN için aynı `analysis_type` daha önce
        hesaplanmışsa, kuyruk atlanır ve sonuç `200` ile anında döner (`{"status":
        "completed", "cached": true}`).


        **Zorunlu alanlar `analysis_type`''a göre değişir:**


        | analysis_type | Ek zorunlu alanlar |

        |---|---|

        | `tech_spec` | `file_base64`, `file_name` |

        | `admin_spec` | `file_base64`, `file_name` |

        | `cost_analysis` | `tender_meta` |

        | `generate_keywords` | `tender_meta` |


        `.doc` (eski Word) reddedilir — `.docx` veya `.pdf` gönderin. `file_base64`
        ham base64''tür (`data:` öneki olmadan).'
      summary: Doküman analizi başlat
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
            examples:
              TeknikŞartname(dosya):
                value:
                  analysis_type: tech_spec
                  file_name: teknik_sartname.pdf
                  file_base64: JVBERi0xLjQKJeLjz9MKMyAwIG9iago8PC9GaWx0ZXI...
                  ikn: 2025/1234567
                summary: Teknik şartname (dosya)
                description: 'Dosya gerektiren türler: tech_spec, admin_spec.'
              MaliyetAnalizi(meta):
                value:
                  analysis_type: cost_analysis
                  ikn: 2025/1234567
                  tender_meta:
                    ihaleAdi: Bilgisayar ve Çevre Birimi Alımı
                    idareAdi: Ankara Büyükşehir Belediyesi
                    ihaleTarihi: 23.03.2027 14:00
                    yaklasikMaliyet: 2500000
                  similar_tenders:
                  - ikn: 2024/1122334
                    sozlesmeBedeli: 2310000
                summary: Maliyet analizi (meta)
                description: 'tender_meta gerektiren türler: cost_analysis, generate_keywords.'
              AnahtarKelimeÜret:
                value:
                  analysis_type: generate_keywords
                  tender_meta:
                    ihaleAdi: Bilgisayar ve Çevre Birimi Alımı
                    idareAdi: Ankara Büyükşehir Belediyesi
                summary: Anahtar kelime üret
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
          description: ''
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskQueued'
          description: ''
  /api/v1/ai/tasks/{task_id}/:
    get:
      operationId: api_v1_ai_tasks_retrieve
      description: '`POST /ai/analyze` yanıtındaki `task_id` ile görevin durumunu
        döner.


        | `data.status` | HTTP | Anlamı |

        |---|---|---|

        | `pending` | 200 | Kuyrukta bekliyor |

        | `processing` | 200 | Worker işliyor |

        | `completed` | 200 | `data.analysis` ve `data.usage` dolu |

        | `failed` | 422 / 500 | `message` hatayı açıklar |


        İstemci `completed` veya `failed` görene kadar birkaç saniye aralıkla yoklar.'
      summary: Analiz durumunu sorgula
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
        description: '`POST /ai/analyze` yanıtındaki Celery görev kimliği (UUID).'
        required: true
        examples:
          GörevKimliği:
            value: 3f8c2b1a-7e4d-4a91-9c2f-8b6d5e1a0c33
            summary: Görev kimliği
      tags:
      - ai
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
          description: ''
  /api/v1/ai/tts/:
    post:
      operationId: api_v1_ai_tts_create
      description: 'Google Cloud TTS ile metni seslendirir ve base64 kodlu ses döner
        (`data.audio_base64`). Kısa bir iş olduğu için **senkron** çalışır, kuyruğa
        alınmaz.


        Sunucuda `GOOGLE_APPLICATION_CREDENTIALS` tanımlı değilse hata döner.'
      summary: Metni sese çevir (TTS)
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TTSRequest'
            examples:
              KısaMetin:
                value:
                  text: Bu ihale 23 Mart 2027 tarihinde saat 14:00'te yapılacaktır.
                summary: Kısa metin
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TTSRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TTSRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TTSResult'
          description: ''
  /api/v1/alarms/:
    get:
      operationId: api_v1_alarms_list
      description: Kullanıcının kurduğu ihale alarmlarını döner.
      summary: Alarmları listele
      tags:
      - alarms
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenderAlarm'
          description: ''
    post:
      operationId: api_v1_alarms_create
      description: İhale için alarm kurar.
      summary: Alarm kur
      tags:
      - alarms
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenderAlarm'
            examples:
              İhaleAlarmıKur:
                value:
                  tender_id: '1234567'
                  tender_ikn: 2025/1234567
                  tender_title: Bilgisayar ve Çevre Birimi Alımı
                  institution: Ankara Büyükşehir Belediyesi
                  reminder_day: true
                  document_change: true
                summary: İhale alarmı kur
                description: '`reminder_day` ihale gününde, `document_change` doküman
                  değişince bildirim üretir. Alarmlar saatlik Celery görevi ile kontrol
                  edilir. Aynı `tender_id` tekrar gönderilirse kayıt güncellenir (upsert).'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TenderAlarm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TenderAlarm'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenderAlarm'
          description: ''
  /api/v1/alarms/{tender_id}/:
    get:
      operationId: api_v1_alarms_retrieve
      description: İhaleye kurulu alarmı döner. Alarm yoksa `data` alanı `null` olur.
      summary: Alarmı getir
      parameters:
      - in: path
        name: tender_id
        schema:
          type: string
        description: İhalenin EKAP iç kimliği (`ekap_id`).
        required: true
        examples:
          EKAPIçKimliği:
            value: '1234567'
            summary: EKAP iç kimliği
      tags:
      - alarms
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenderAlarm'
          description: ''
    delete:
      operationId: api_v1_alarms_destroy
      description: İhale alarmını siler. Kayıt yoksa da `204` döner (idempotent).
      summary: Alarmı sil
      parameters:
      - in: path
        name: tender_id
        schema:
          type: string
        description: İhalenin EKAP iç kimliği (`ekap_id`).
        required: true
        examples:
          EKAPIçKimliği:
            value: '1234567'
            summary: EKAP iç kimliği
      tags:
      - alarms
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/assistant/chat/:
    post:
      operationId: api_v1_assistant_chat_create
      description: 'Mesajı kaydeder ve yanıtı arka planda üretir. `conversation` verilmezse
        yeni bir sohbet oturumu açılır; dönen `conversation_id` sonraki mesajlarda
        gönderilmelidir. Dönen `task_id`, mevcut `GET /ai/tasks/{task_id}/` ucu ile
        sorgulanır; tamamlanınca `analysis` alanı asistan mesajıdır: `{id, conversation,
        role, content, tender_cards, created_at}`.'
      summary: Asistana mesaj gönder
      tags:
      - assistant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSend'
            examples:
              MesajGönder:
                value:
                  message: Bana uygun ihale var mı?
                  conversation: null
                summary: Mesaj gönder
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatSend'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatSend'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatAccepted'
          description: ''
  /api/v1/assistant/conversations/:
    get:
      operationId: api_v1_assistant_conversations_retrieve
      description: Kullanıcının geçmiş sohbetlerini **en son güncellenenden eskiye**
        döner. `kind=digest` kayıtları günlük öneri özetleridir.
      summary: Sohbet oturumlarını listele
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Sayfa numarası (1'den başlar).
      - in: query
        name: page_size
        schema:
          type: integer
        description: Sayfa boyutu (varsayılan 30, en çok 100).
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'
          description: ''
  /api/v1/assistant/conversations/{id}/:
    get:
      operationId: api_v1_assistant_conversation_messages
      description: Seçili oturumun mesajlarını **en yeniden eskiye** döner (inverted
        liste).
      summary: Sohbet oturumunun mesajlarını listele
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: query
        name: page
        schema:
          type: integer
        description: Sayfa numarası.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Sayfa boyutu.
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMessagePage'
          description: ''
    delete:
      operationId: api_v1_assistant_conversations_destroy
      description: Oturumu ve içindeki tüm mesajları siler.
      summary: Sohbet oturumunu sil
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDeleted'
          description: ''
  /api/v1/assistant/messages/:
    get:
      operationId: api_v1_assistant_messages_retrieve
      description: 'Asistan sohbet mesajlarını **en yeniden eskiye** döner (mobil
        inverted liste için). Yanıt: `data.list`, `data.totalCount`, `data.page`.'
      summary: Sohbet geçmişini listele
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Sayfa numarası (1'den başlar).
      - in: query
        name: page_size
        schema:
          type: integer
        description: Sayfa boyutu (varsayılan 30, en çok 100).
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessagePage'
          description: ''
  /api/v1/assistant/profile/:
    get:
      operationId: api_v1_assistant_profile_retrieve
      description: Kullanıcının firma profilini döner. Profil yoksa **404** döner
        — mobil uygulama bunu 'onboarding gerekli' olarak yorumlar.
      summary: Firma profilini getir
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfile'
          description: ''
    put:
      operationId: api_v1_assistant_profile_update
      description: Profili oluşturur veya günceller ve **profil haritası üretimini**
        arka planda başlatır. Yanıttaki `task_id` mevcut `GET /ai/tasks/{task_id}/`
        ucu ile sorgulanır; tamamlanınca `analysis` alanı profil haritasıdır.
      summary: Firma profilini kaydet (upsert)
      tags:
      - assistant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyProfile'
            examples:
              FirmaProfiliKaydet:
                value:
                  company_name: Örnek İnşaat Ltd. Şti.
                  sector: İnşaat / Yapım
                  activity_areas: Yol, altyapı ve bina inşaatı; asfalt serimi
                  cities:
                  - 251
                  - 284
                  tender_types:
                  - 2
                  budget_min: 1000000
                  budget_max: 50000000
                  past_works:
                  - 2023 Ankara Çankaya yol yapımı
                  - 2022 okul binası onarımı
                summary: Firma profili kaydet
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompanyProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CompanyProfile'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileAccepted'
          description: ''
  /api/v1/assistant/recommendations/:
    get:
      operationId: api_v1_assistant_recommendations_retrieve
      description: Günlük eşleştirme görevinin ürettiği kişisel ihale önerilerini
        döner. `days` parametresi kaç günlük önerinin listeleneceğini belirler.
      summary: İhale önerilerini listele
      parameters:
      - in: query
        name: days
        schema:
          type: integer
        description: Kaç günlük öneri (varsayılan 7).
      - in: query
        name: page
        schema:
          type: integer
        description: Sayfa numarası.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Sayfa boyutu.
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationPage'
          description: ''
  /api/v1/assistant/recommendations/{id}/seen/:
    post:
      operationId: api_v1_assistant_recommendations_seen_create
      description: Öneri kaydını görüldü yapar. Kayıt yoksa `data.updated` 0 döner.
      summary: Öneriyi görüldü işaretle
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assistant
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationSeen'
          description: ''
  /api/v1/auth/deactivate/:
    post:
      operationId: api_v1_auth_deactivate_create
      description: Hesabı pasifleştirir (`is_active=False`). Kayıtlar silinmez, ancak
        kullanıcı bir daha giriş yapamaz — login `403` döner. Gövde gerektirmez.
      summary: Hesabı devre dışı bırak
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/auth/fcm-token/:
    post:
      operationId: api_v1_auth_fcm_token_create
      description: Push bildirimleri için cihazın Firebase Cloud Messaging token'ını
        kaydeder. Sunucuda `FCM_CREDENTIALS` tanımlı değilse push gönderimi devre
        dışıdır, token yine de saklanır.
      summary: FCM token kaydet
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FCMToken'
            examples:
              CihazToken'ı:
                value:
                  fcm_token: fMEP0vJqR0m2Xy1s_example_device_token_abc123
                summary: Cihaz token'ı
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FCMToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FCMToken'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: '`username` **veya** `email` ile giriş yapılır (biri yeterli).
        Yanıttaki `access` token''ı `Authorization: Bearer <access>` header''ında
        kullanın.


        Postman''de bu istek başarılı olduğunda `access_token` ve `refresh_token`
        koleksiyon değişkenleri otomatik doldurulur.'
      summary: Giriş yap
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
            examples:
              E-postaIle:
                value:
                  email: test@ihaletakip.com
                  password: Test1234!
                summary: E-posta ile
              KullanıcıAdıIle:
                value:
                  username: firat
                  password: Test1234!
                summary: Kullanıcı adı ile
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: api_v1_auth_logout_create
      description: 'Gönderilen `refresh` token''ı kara listeye alır.


        **Dikkat:** Bu endpoint kimlik doğrulaması ister — gövdedeki `refresh`''in
        yanında geçerli bir `Authorization: Bearer <access>` header''ı da gerekir.


        Kara liste yalnızca refresh token''ları kapsar; mevcut `access` token kendi
        ömrü (1 gün) dolana kadar geçerli kalmaya devam eder — istemci onu cihazdan
        silmelidir.'
      summary: Çıkış yap
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
            examples:
              RefreshTokenIle:
                value:
                  refresh: '{{refresh_token}}'
                summary: Refresh token ile
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '205':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/auth/preferences/:
    patch:
      operationId: api_v1_auth_preferences_partial_update
      description: '`preferences` serbest biçimli bir JSON nesnesidir; gönderilen
        değer mevcut tercihlerin **yerine geçer** (birleştirme yapılmaz).'
      summary: Tercihleri güncelle
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPreferences'
            examples:
              Bildirim+TemaTercihleri:
                value:
                  preferences:
                    theme: dark
                    notifications:
                      push: true
                      email: false
                    default_cities:
                    - 251
                    - 284
                summary: Bildirim + tema tercihleri
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPreferences'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPreferences'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preferences'
          description: ''
  /api/v1/auth/profile/:
    get:
      operationId: api_v1_auth_profile_retrieve
      description: Oturum açmış kullanıcının profilini döner.
      summary: Profili getir
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: api_v1_auth_profile_partial_update
      description: Kısmi güncelleme. Yalnızca `display_name`, `email`, `photo_url`
        ve `preferences` yazılabilir; `id`, `username`, `provider` ve `date_joined`
        salt okunurdur.
      summary: Profili güncelle
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUser'
            examples:
              İsimGüncelle:
                value:
                  display_name: Fırat Badur
                summary: İsim güncelle
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUser'
