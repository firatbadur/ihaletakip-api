# ═══════════════════════════════════════════════════════
#  IhaleTakip API — nginx ters proxy (TLS / Cloudflare Full-strict)
#  Cloudflare (443/SSL) → sunucu:443 (nginx TLS) → gunicorn (web:8000)
#  Origin sertifikası: Cloudflare "Origin Certificate" (15 yıl, yenileme yok).
#  Panel: SSL/TLS → Origin Server → Create Certificate. SSL modu: Full (strict).
# ═══════════════════════════════════════════════════════

upstream django_app {
    server web:8000;
    keepalive 32;
}

# ── Cloudflare gerçek ziyaretçi IP'si ──────────────────
# CF, origin'e kendi IP'siyle bağlanır; gerçek IP CF-Connecting-IP'dedir.
# Aralıklar değişebilir → güncel liste: https://www.cloudflare.com/ips
# IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── TLS (Cloudflare Origin Certificate) ────────────
    ssl_certificate     /etc/nginx/certs/cf-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # ── (Opsiyonel) Authenticated Origin Pulls ─────────
    # Yalnızca Cloudflare'in origin'e bağlanabilmesini garanti eder (mTLS).
    # CF origin-pull CA'sını indirip certs/ altına koy ve aşağıyı aç:
    #   ssl_client_certificate /etc/nginx/certs/cloudflare-origin-pull-ca.pem;
    #   ssl_verify_client on;

    # AI doküman yükleme payı (settings.MAX_FILE_SIZE = 10 MB)
    client_max_body_size 20m;

    # Cloudflare sıkıştırmayı üstlenir; nginx tekrar sıkıştırmasın
    gzip off;
    server_tokens off;

    location / {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Cloudflare, ziyaretçi tarafındaki şemayı bu header'da iletir (https).
        # settings.SECURE_PROXY_SSL_HEADER bunu okuyup güvenli çerezleri etkinleştirir.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_redirect off;
        proxy_connect_timeout 60s;
        # Canlı EKAP detay/belge-url çağrıları yavaş olabilir → gunicorn timeout (180) ile hizalı
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
    }

    # Sağlık kontrolü (Cloudflare/uptime izleme) — kimlik gerektirmez
    location = /health/ {
        proxy_pass http://django_app;
        access_log off;
    }
}
